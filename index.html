<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Song of Day</title>
</head>
<body>
    <!-- Song of the Day (auto/random later) -->
    <section id="mainSOTD">
        <h1>Song of the Day</h1>
        <div id="dailySong">
            <h2 class="mainSong"></h2>
            <p class="dailyArtist"></p>
            <img src="" alt="" class="dailyAlbum">
            <audio controls src="" class="dailySongPreview"></audio>
        </div>
    </section>

    <!-- Search Section -->
    <section id="searchSection">
        <h2 class="sectionH2">Search for a Song</h2>

        <div class="searchBox">
            <input type="text" placeholder="Artist or Song" id="artistName">
            <button id="search">Search</button>
        </div>

        <section id="results">

        </section>
    </section>

    <script src="/assets/main.js"></script>
</body>
</html>
