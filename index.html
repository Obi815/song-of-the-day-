<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song of Day</title>
</head>
<body>
    <!-- Song of the Day (auto/random later) -->
    <section id="mainSOTD">
        <h1>Song of the Day</h1>
        <div id="dailySong">
            <h2 class="mainSong"></h2>
            <p class="mainArtist"></p>
            <img src="" alt="" class="mainAlbum">
        </div>
    </section>

    <!-- Search Section -->
    <section id="searchSection">
        <h2>Search for a Song</h2>

        <input type="text" placeholder="Artist or Song" id="artistName">
        <button id="search">Search</button>

        <section id="results">
            <h2 class="trackName"></h2>
            <p class="artist"></p>
            <img src="" alt="" class="albumImage">
        </section>
    </section>

    <script src="/assets/main.js"></script>
</body>
</html>
